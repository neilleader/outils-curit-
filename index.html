<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOJ - Dashboard Interactif</title>
    <style>
        :root {
            --primary: #1a237e;
            --accent: #304ffe;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --tab-inactive: #334155;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        header {
            background: linear-gradient(90deg, var(--primary), var(--accent));
            padding: 20px;
            text-align: center;
        }

        h1 { margin: 0; font-size: 24px; letter-spacing: 2px; text-transform: uppercase; }

        .tabs-bar {
            display: flex;
            flex-wrap: wrap;
            background: #00000040;
            padding: 10px 10px 0 10px;
            gap: 5px;
            border-bottom: 2px solid var(--accent);
        }

        .tab-btn {
            padding: 12px 20px;
            border: none;
            background: var(--tab-inactive);
            color: white;
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 12px;
        }

        .tab-btn:hover { background: #475569; }

        .tab-btn.active {
            background: var(--accent);
            box-shadow: 0 -2px 10px rgba(48, 79, 254, 0.4);
        }

        .tab-content {
            display: none;
            padding: 30px;
            animation: fadeIn 0.4s ease;
        }

        .tab-content.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }

        .card {
            background: #334155;
            padding: 15px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .card:hover {
            background: #475569;
            border-color: var(--accent);
            transform: scale(1.02);
        }

        .card span { font-size: 11px; color: #94a3b8; margin-bottom: 5px; }
        .card strong { color: #60a5fa; font-size: 15px; }

        .logos { display: flex; justify-content: center; gap: 50px; padding: 15px; background: rgba(0,0,0,0.1); }
        .logo { height: 50px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>DEPARTEMENT DE LA SECURITE DU PALAIS DE JUSTICE</h1>
    </header>

    <div class="tabs-bar">
        <button class="tab-btn active" onclick="openTab(event, 'lexique')">Document Agent de Sécurité </button>
    </div>

    <div id="lexique" class="tab-content active">
        <div class="grid">
            <a href="https://www.canva.com/design/DAGpxeG029o/GKr7ChU_ySQnL70ammZbwA/edit" target="_blank" class="card"><span>Document</span><strong>Consigne de Sécurité</strong></a>
            <a href="https://www.canva.com/design/DAGnXB7jQrc/JOy1eNa__KoavTv5AjQ5Kw/edit" class="card"><span>Document</span><strong>Formation Initiale </strong></a>
            <a href="https://www.canva.com/design/DAGaZhdQKhQ/5UKtqbLVgPR0orZw29BOvw/edit?ui=eyJEIjp7IlAiOnsiQiI6ZmFsc2V9fX0" target="_blank" class="card"><span>Document</span><strong>Formation Convoi</strong></a>           
        </div>
    </div>


<script>
    function openTab(evt, tabName) {
        var i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = "none";
            tabcontent[i].classList.remove("active");
        }
        tablinks = document.getElementsByClassName("tab-btn");
        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].classList.remove("active");
        }
        document.getElementById(tabName).style.display = "block";
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }
</script>

</body>
</html>
